<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"/>
  <meta name="theme-color" content="#6B1E2C"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CAVE"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icon-192.png"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <title>CAVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://mgekvgcshvhhqrzmouex.supabase.co"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
  <style>
    body{margin:0;background:#FAF6EE}
    #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FAF6EE;z-index:9999;transition:opacity .3s}
    #splash.hide{opacity:0;pointer-events:none}
    #splash img{width:64px;height:64px;margin-bottom:10px}
    #splash h1{font-family:Georgia,serif;font-size:36px;font-weight:500;color:#6B1E2C;letter-spacing:.08em;margin:0}
    #splash p{font-family:Georgia,serif;font-size:14px;color:#8B7A7A;font-style:italic;margin:6px 0 0}
    @keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}
    #splash .dot{width:6px;height:6px;border-radius:3px;background:#6B1E2C;margin-top:20px;animation:breathe 1.2s infinite}
  </style>
</head>
<body>
  <div id="splash"><img src="/logo.png" alt=""/><h1>CAVE</h1><p>Votre sommelier de poche</p><div class="dot"></div></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.__hideSplash=()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),300);}};
    if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
  </script>
</body>
</html>
